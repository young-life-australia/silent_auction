<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Young Life Australia — Silent Auction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#90C038; --green-d:#74961f; --green-deep:#5f7d17;
    --slate:#385060; --slate-d:#2a3d49; --slate-dd:#1b262d;
    --paper:#FBFBF6; --card:#ffffff; --line:#e7e6dd;
    --ink:#28323a; --muted:#6c7a82;
    --amber:#E8B23A; --red:#d2493f;
    --shadow:0 1px 2px rgba(40,50,58,.06), 0 8px 24px rgba(40,50,58,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;margin:0;line-height:1.05;letter-spacing:-.01em}
  .num{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,textarea,select{font-family:inherit;font-size:16px}
  a{color:inherit}

  /* layout */
  .wrap{max-width:760px;margin:0 auto;padding:0 18px 90px}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(251,251,246,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topbar .inner{max-width:760px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Bricolage Grotesque';font-weight:800;color:var(--slate);font-size:18px}
  .brand .yl{width:30px;height:30px;border-radius:8px;background:var(--green);display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px}
  .spacer{flex:1}
  .ghost{font-size:12px;color:var(--muted);text-decoration:none;padding:6px 10px;border-radius:8px}
  .ghost:hover{background:#fff}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;border-radius:12px;padding:13px 18px;font-size:15px;transition:transform .05s ease, background .15s ease}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--green);color:#fff}
  .btn-primary:hover{background:var(--green-d)}
  .btn-slate{background:var(--slate);color:#fff}
  .btn-slate:hover{background:var(--slate-d)}
  .btn-outline{background:#fff;border:1.5px solid var(--line);color:var(--slate)}
  .btn-outline:hover{border-color:var(--slate-l,#9aa)}
  .btn-danger{background:#fff;border:1.5px solid #eccfcc;color:var(--red)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-sm{padding:9px 12px;font-size:13px;border-radius:10px}
  .btn-block{width:100%}

  .field{display:block;margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .field input,.field textarea,.field select{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;background:#fff;color:var(--ink)}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--green)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}

  /* guest hero */
  .hero{padding:26px 0 8px}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green-deep)}
  .hero h1{font-size:clamp(26px,7vw,38px);color:var(--slate);margin-top:8px}
  .hero .sub{color:var(--muted);margin-top:8px;font-size:15px}
  .statusbar{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:7px 12px;border-radius:999px;background:#fff;border:1px solid var(--line)}
  .pill .dot{width:8px;height:8px;border-radius:999px;background:var(--muted)}
  .pill.open .dot{background:var(--green);box-shadow:0 0 0 4px rgba(144,192,56,.18)}
  .pill.closed .dot{background:var(--red)}
  .pill .clk{font-variant-numeric:tabular-nums;font-weight:700;color:var(--slate)}

  /* lot card */
  .lot{overflow:hidden;margin-top:16px}
  .lot .photo{aspect-ratio:16/9;background:#eef0ea;display:block;width:100%;object-fit:cover}
  .lot .photo.empty{display:grid;place-items:center;color:#aeb6ad;font-size:13px}
  .lot .body{padding:16px 16px 18px}
  .lot h3{font-size:19px;color:var(--slate)}
  .lot .desc{color:var(--muted);font-size:14px;margin-top:6px}
  .lot .bidrow{display:flex;align-items:flex-end;justify-content:space-between;margin-top:14px;gap:12px}
  .lot .amt{font-family:'Bricolage Grotesque';font-weight:800;font-size:26px;color:var(--green-deep)}
  .lot .amt small{display:block;font-family:'Plus Jakarta Sans';font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
  .lot .leader{font-size:12.5px;color:var(--muted);text-align:right}
  .lot .leader b{color:var(--slate)}
  .quick{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .quick .btn-sm{flex:1;min-width:90px}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(27,38,45,.5);backdrop-filter:blur(2px);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}
  .sheet{background:#fff;width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:22px 20px 28px;animation:rise .22s ease}
  @media(min-width:560px){.scrim{align-items:center}.sheet{border-radius:20px}}
  @keyframes rise{from{transform:translateY(24px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sheet h3{font-size:22px;color:var(--slate)}
  .sheet .meta{color:var(--muted);font-size:13px;margin-top:4px}

  /* toast */
  .toasts{position:fixed;left:0;right:0;bottom:18px;z-index:80;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
  .toast{background:var(--slate-d);color:#fff;padding:11px 16px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:rise .2s ease}
  .toast.win{background:var(--green-d)}

  /* ===== BOARD (projector) ===== */
  .board{min-height:100vh;background:var(--slate-dd);color:#fff;padding:28px 34px 40px}
  .board .bhead{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .board .bbrand{display:flex;align-items:center;gap:14px}
  .board .bbrand .yl{width:54px;height:54px;border-radius:13px;background:var(--green);display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:22px}
  .board .bbrand .t{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(22px,2.4vw,34px);line-height:1}
  .board .bbrand .t small{display:block;font-family:'Plus Jakarta Sans';font-weight:600;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--green);margin-top:6px}
  .countbox{margin-left:auto;text-align:right}
  .countbox .lbl{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#8ea0aa;font-weight:700}
  .countbox .clock{font-family:'Bricolage Grotesque';font-weight:800;font-variant-numeric:tabular-nums;font-size:clamp(48px,7vw,96px);line-height:.95;color:var(--amber);letter-spacing:.01em}
  .countbox .clock.urgent{color:var(--red);animation:pulse 1s ease-in-out infinite}
  .countbox .clock.done{color:#8ea0aa;font-size:clamp(34px,4vw,56px)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

  .totalbar{display:flex;align-items:center;justify-content:space-between;gap:24px;margin:26px 0 8px;padding:20px 26px;background:linear-gradient(100deg,var(--slate-d),var(--slate));border-radius:18px;flex-wrap:wrap}
  .totalbar .tt{font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#aebfc8;font-weight:700}
  .totalbar .tv{font-family:'Bricolage Grotesque';font-weight:800;font-variant-numeric:tabular-nums;font-size:clamp(40px,6vw,76px);color:var(--green);line-height:1}
  .totalbar .qr{background:#fff;padding:10px;border-radius:12px;text-align:center}
  .totalbar .qr canvas,.totalbar .qr img{display:block}
  .totalbar .qr span{display:block;font-size:11px;color:var(--slate);font-weight:700;margin-top:6px;letter-spacing:.04em}

  .bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:18px}
  .bcard{background:#22323b;border:1px solid #2f4450;border-radius:15px;padding:16px 18px;display:flex;flex-direction:column;gap:6px;min-height:120px}
  .bcard .bt{font-family:'Bricolage Grotesque';font-weight:700;font-size:19px}
  .bcard .bv{font-family:'Bricolage Grotesque';font-weight:800;font-variant-numeric:tabular-nums;font-size:34px;color:var(--green);margin-top:auto}
  .bcard .bl{font-size:13px;color:#9fb1bb}
  .bcard .bl b{color:#dfe9ee}

  /* ===== ADMIN ===== */
  .tabs{display:flex;gap:6px;margin:16px 0;background:#fff;border:1px solid var(--line);border-radius:13px;padding:5px}
  .tabs button{flex:1;padding:10px;border-radius:9px;font-weight:700;font-size:13px;color:var(--muted)}
  .tabs button.on{background:var(--slate);color:#fff}
  .adminrow{display:flex;gap:10px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
  .adminrow:last-child{border-bottom:none}
  .adminrow .grow{flex:1;min-width:0}
  .adminrow .grow b{color:var(--slate)}
  .adminrow .grow div{font-size:13px;color:var(--muted)}
  .linkbox{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:10px;font-size:13px}
  .linkbox code{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--slate)}

  .setup{max-width:640px;margin:40px auto;padding:0 20px}
  .setup .card{padding:26px}
  .setup code{background:#f1f2ec;padding:2px 6px;border-radius:6px;font-size:13px}
  .setup ol{padding-left:18px;line-height:1.9}
  .empty{text-align:center;color:var(--muted);padding:50px 20px}
  .err{background:#fbeceb;border:1px solid #f1cfcc;color:#b23b32;padding:11px 14px;border-radius:11px;font-size:14px;margin-top:10px}

  /* organiser-supplied graphic + messages */
  .ghead{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .glogo{background:#fff;border:1px solid var(--line);border-radius:13px;padding:7px 10px;display:grid;place-items:center;flex:none}
  .glogo img{max-height:58px;max-width:160px;display:block;object-fit:contain}
  .gtitle{min-width:0}
  .board .blogo{background:#fff;border-radius:16px;padding:12px 18px;display:grid;place-items:center}
  .board .blogo img{max-height:96px;max-width:380px;display:block;object-fit:contain}
  .board .bmsg{margin-top:18px;font-size:clamp(17px,2vw,26px);font-weight:600;color:#e7eef2;line-height:1.35;max-width:1100px;white-space:pre-wrap}
  .bcard .bphoto{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:10px;margin-bottom:10px;background:#2b3d47}
  .bcard .bdesc{font-size:13.5px;color:#9fb1bb;line-height:1.4}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ============================================================
   CONFIG  —  fill these three in, then commit & push.
   The anon key is SAFE to expose publicly; that is what it is for.
   The passcode is client-side only (fine for a known event crowd).
   ============================================================ */
const SUPABASE_URL      = "https://oxmcfcljabwzvcgfrcbr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94bWNmY2xqYWJ3enZjZ2ZyY2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMjgwNDcsImV4cCI6MjA5NjkwNDA0N30.9W0TuOvIOmkn7UDTqp2I6eLMLHZTe3j1wIartfGiyuk";
const ORGANISER_PASSCODE = "vjBcUUWlf7Flqs";

const SB_URL = SUPABASE_URL.trim().replace(/\/+$/, "");   // strip trailing slash(es)
const SB_KEY = SUPABASE_ANON_KEY.trim();
const configured = SB_URL.startsWith("http") && SB_KEY.length > 20;
const sb = configured ? window.supabase.createClient(SB_URL, SB_KEY) : null;

/* ---------- helpers ---------- */
const money = (n) => "$" + Number(n||0).toLocaleString("en-AU", {maximumFractionDigits:0});
const firstName = (s="") => (s.trim().split(/\s+/)[0] || s);
function fmtLeft(ms){
  if(ms==null) return "—";
  if(ms<=0) return "0:00";
  const t=Math.floor(ms/1000), h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=t%60;
  const pad=(x)=>String(x).padStart(2,"0");
  return h>0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
}
function summarize(bids){
  const m={};
  for(const b of bids){
    const k=b.lot_id, a=Number(b.amount);
    if(!m[k]) m[k]={high:a,name:b.bidder_name,count:1};
    else {m[k].count++; if(a>m[k].high){m[k].high=a;m[k].name=b.bidder_name;}}
  }
  return m;
}
function useNow(){
  const [n,setN]=useState(Date.now());
  useEffect(()=>{const id=setInterval(()=>setN(Date.now()),1000);return ()=>clearInterval(id);},[]);
  return n;
}
function compressImage(file, mime="image/jpeg", max=900){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{const img=new Image();img.onload=()=>{
      const sc=Math.min(1,max/img.width);
      const c=document.createElement("canvas");
      c.width=img.width*sc; c.height=img.height*sc;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);  // PNG keeps transparency
      res(c.toDataURL(mime, mime==="image/jpeg"?0.72:undefined));
    };img.onerror=rej;img.src=r.result;};
    r.onerror=rej; r.readAsDataURL(file);
  });
}

/* ---------- data hook ---------- */
function useAuction(){
  const [lots,setLots]=useState([]);
  const [bids,setBids]=useState([]);
  const [cfg,setCfg]=useState({event_name:"Young Life Australia Auction",is_open:false,closes_at:null});
  const [ready,setReady]=useState(false);
  const [err,setErr]=useState(null);
  const tmr=useRef(null);

  const reload=useCallback(async()=>{
    if(!sb) return;
    try{
      const [L,B,C]=await Promise.all([
        sb.from("lots").select("*").order("sort_order",{ascending:true}).order("id",{ascending:true}),
        sb.from("bids").select("*").order("created_at",{ascending:true}),
        sb.from("auction").select("*").eq("id",1).maybeSingle(),
      ]);
      if(L.error||B.error) throw (L.error||B.error);
      setLots(L.data||[]); setBids(B.data||[]);
      if(C.data) setCfg(C.data);
      setErr(null); setReady(true);
    }catch(e){ setErr(e.message||String(e)); setReady(true); }
  },[]);

  useEffect(()=>{
    if(!sb) return;
    reload();
    const ping=()=>{clearTimeout(tmr.current);tmr.current=setTimeout(reload,250);};
    const ch=sb.channel("auction-live")
      .on("postgres_changes",{event:"*",schema:"public",table:"bids"},ping)
      .on("postgres_changes",{event:"*",schema:"public",table:"lots"},ping)
      .on("postgres_changes",{event:"*",schema:"public",table:"auction"},ping)
      .subscribe();
    const poll=setInterval(reload,6000); // fallback if realtime is capped
    return ()=>{clearInterval(poll);sb.removeChannel(ch);};
  },[reload]);

  return {lots,bids,cfg,ready,err,reload};
}

/* ============================================================ */
function Toasts({items}){
  return <div className="toasts">{items.map(t=>(
    <div key={t.id} className={"toast "+(t.win?"win":"")}>{t.msg}</div>
  ))}</div>;
}

function StatusPill({open,timeLeft}){
  return (
    <span className={"pill "+(open?"open":"closed")}>
      <span className="dot"></span>
      {open ? <>Bidding open{timeLeft!=null && <> · closes in <span className="clk num">{fmtLeft(timeLeft)}</span></>}</> : "Bidding closed"}
    </span>
  );
}

/* ---------------- GUEST ---------------- */
function GuestView({data}){
  const {lots,bids,cfg}=data;
  const now=useNow();
  const [name,setName]=useState(()=>localStorage.getItem("yla_name")||"");
  const [tmpName,setTmpName]=useState("");
  const [active,setActive]=useState(null);     // lot being bid on
  const [amt,setAmt]=useState("");
  const [busy,setBusy]=useState(false);
  const [bidErr,setBidErr]=useState(null);
  const [toasts,setToasts]=useState([]);
  const prevLead=useRef({});

  const sum=useMemo(()=>summarize(bids),[bids]);
  const closesAt=cfg.closes_at?new Date(cfg.closes_at).getTime():null;
  const timeLeft=closesAt!=null?closesAt-now:null;
  const open=cfg.is_open && (closesAt==null||timeLeft>0);

  // outbid / winning notifications
  useEffect(()=>{
    if(!name) return;
    const me=name.trim().toLowerCase();
    const next={};
    lots.forEach(l=>{const s=sum[l.id];const leadMe=s&&s.name.trim().toLowerCase()===me;next[l.id]=leadMe;
      const was=prevLead.current[l.id];
      if(was===true && leadMe===false){pushToast(`You've been outbid on ${l.title}`,false);}
    });
    prevLead.current=next;
  },[bids]); // eslint-disable-line

  function pushToast(msg,win){
    const id=Math.random().toString(36).slice(2);
    setToasts(t=>[...t,{id,msg,win}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3800);
  }
  function saveName(){const n=tmpName.trim();if(n.length<2)return;localStorage.setItem("yla_name",n);setName(n);}
  function openBid(l){
    const s=sum[l.id];
    const floor=s?Number(s.high)+Number(l.increment):Number(l.starting_price);
    setActive(l);setAmt(String(floor));setBidErr(null);
  }
  async function submit(){
    if(!active)return;
    const s=sum[active.id];
    const floor=s?Number(s.high)+Number(active.increment):Number(active.starting_price);
    const v=Number(amt);
    if(!v||v<floor){setBidErr(`Bid must be at least ${money(floor)}`);return;}
    setBusy(true);setBidErr(null);
    const {error}=await sb.from("bids").insert({lot_id:active.id,bidder_name:name,amount:v});
    setBusy(false);
    if(error){setBidErr(error.message);return;}
    pushToast(`Bid placed on ${active.title} — ${money(v)}`,true);
    setActive(null);
    data.reload();
  }

  if(!name){
    return (
      <div className="wrap">
        <div className="hero">
          <div className="ghead">
            {cfg.banner_image && <div className="glogo"><img src={cfg.banner_image} alt=""/></div>}
            <div className="gtitle"><div className="eyebrow">Silent Auction</div><h1>{cfg.event_name}</h1></div>
          </div>
          {cfg.bid_message
            ? <p className="sub" style={{whiteSpace:"pre-wrap"}}>{cfg.bid_message}</p>
            : <p className="sub">Pop your name in to start bidding from your table.</p>}
        </div>
        <div className="card" style={{padding:20,marginTop:8}}>
          <div className="field"><label>Your name</label>
            <input value={tmpName} onChange={e=>setTmpName(e.target.value)} placeholder="e.g. Sarah Chen" onKeyDown={e=>e.key==="Enter"&&saveName()} autoFocus/>
          </div>
          <button className="btn btn-primary btn-block" onClick={saveName} disabled={tmpName.trim().length<2}>Start bidding</button>
        </div>
      </div>
    );
  }

  return (
    <div className="wrap">
      <div className="hero">
        <div className="ghead">
          {cfg.banner_image && <div className="glogo"><img src={cfg.banner_image} alt=""/></div>}
          <div className="gtitle"><div className="eyebrow">Silent Auction · bidding as {firstName(name)}</div><h1>{cfg.event_name}</h1></div>
        </div>
        {cfg.bid_message && <p className="sub" style={{whiteSpace:"pre-wrap"}}>{cfg.bid_message}</p>}
        <div className="statusbar"><StatusPill open={open} timeLeft={timeLeft}/></div>
      </div>

      {lots.length===0 && <div className="empty">Lots will appear here once the organiser sets them up.</div>}

      {lots.map(l=>{
        const s=sum[l.id];
        const cur=s?s.high:l.starting_price;
        const leadMe=s&&s.name.trim().toLowerCase()===name.trim().toLowerCase();
        return (
          <div className="card lot" key={l.id}>
            {l.image ? <img className="photo" src={l.image} alt=""/> : <div className="photo empty">No photo</div>}
            <div className="body">
              <h3>{l.title}</h3>
              {l.description && <div className="desc">{l.description}</div>}
              <div className="bidrow">
                <div className="amt"><small>{s?"Current bid":"Starting price"}</small>{money(cur)}</div>
                <div className="leader">
                  {s ? <>{s.count} bid{s.count===1?"":"s"}<br/><b>{leadMe?"You're leading":firstName(s.name)+" leads"}</b></> : "No bids yet"}
                </div>
              </div>
              {open
                ? <div className="quick">
                    {[1,2,5].map(mult=>{
                      const step=Number(l.increment)*mult;
                      const base=s?Number(s.high):Number(l.starting_price)-Number(l.increment);
                      const v=base+step;
                      return <button key={mult} className="btn btn-outline btn-sm" onClick={()=>{setActive(l);setAmt(String(v));setBidErr(null);}}>+{money(step)}</button>;
                    })}
                    <button className="btn btn-primary btn-sm" onClick={()=>openBid(l)} style={{flexBasis:"100%"}}>Bid an amount</button>
                  </div>
                : <div style={{marginTop:12,fontSize:13,color:"var(--muted)"}}>Bidding is closed for this lot.</div>}
            </div>
          </div>
        );
      })}

      {active && (
        <div className="scrim" onClick={e=>{if(e.target===e.currentTarget)setActive(null);}}>
          <div className="sheet">
            <h3>{active.title}</h3>
            <div className="meta">{(()=>{const s=sum[active.id];const floor=s?Number(s.high)+Number(active.increment):Number(active.starting_price);return `Minimum bid ${money(floor)}`;})()}</div>
            <div className="field" style={{marginTop:16}}><label>Your bid (AUD)</label>
              <input type="number" inputMode="numeric" value={amt} onChange={e=>setAmt(e.target.value)} autoFocus/>
            </div>
            {bidErr && <div className="err">{bidErr}</div>}
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={()=>setActive(null)}>Cancel</button>
              <button className="btn btn-primary" style={{flex:2}} onClick={submit} disabled={busy}>{busy?"Placing…":"Place bid"}</button>
            </div>
          </div>
        </div>
      )}
      <Toasts items={toasts}/>
    </div>
  );
}

/* ---------------- BOARD ---------------- */
function QR({text}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.QRCode)return;
    ref.current.innerHTML="";
    new window.QRCode(ref.current,{text,width:104,height:104,colorDark:"#1b262d",colorLight:"#ffffff"});
  },[text]);
  return <div ref={ref}/>;
}
function BoardView({data}){
  const {lots,bids,cfg}=data;
  const now=useNow();
  const sum=useMemo(()=>summarize(bids),[bids]);
  const closesAt=cfg.closes_at?new Date(cfg.closes_at).getTime():null;
  const timeLeft=closesAt!=null?closesAt-now:null;
  const open=cfg.is_open && (closesAt==null||timeLeft>0);
  const total=lots.reduce((a,l)=>a+(sum[l.id]?Number(sum[l.id].high):0),0);
  const bidUrl=location.origin+location.pathname;
  const urgent=open&&timeLeft!=null&&timeLeft<=120000;
  const ordered=useMemo(()=>[...lots].sort((a,b)=>{
    const ha=sum[a.id]?Number(sum[a.id].high):-1, hb=sum[b.id]?Number(sum[b.id].high):-1;
    return hb!==ha ? hb-ha : (a.sort_order||0)-(b.sort_order||0);
  }),[lots,sum]);

  return (
    <div className="board">
      <div className="bhead">
        <div className="bbrand">
          {cfg.banner_image ? <div className="blogo"><img src={cfg.banner_image} alt=""/></div> : <div className="yl">YL</div>}
          <div className="t">{cfg.event_name}<small>Silent Auction</small></div>
        </div>
        <div className="countbox">
          <div className="lbl">{open?"Bidding closes in":"Bidding"}</div>
          {open
            ? <div className={"clock num "+(urgent?"urgent":"")}>{fmtLeft(timeLeft)}</div>
            : <div className="clock done">{closesAt&&timeLeft<=0?"CLOSED":"NOT YET OPEN"}</div>}
        </div>
      </div>
      {cfg.board_message && <div className="bmsg">{cfg.board_message}</div>}

      <div className="totalbar">
        <div><div className="tt">Raised so far</div><div className="tv num">{money(total)}</div></div>
        {window.QRCode && <div className="qr"><QR text={bidUrl}/><span>Scan to bid</span></div>}
      </div>

      <div className="bgrid">
        {ordered.map(l=>{const s=sum[l.id];return (
          <div className="bcard" key={l.id}>
            {l.image && <img className="bphoto" src={l.image} alt=""/>}
            <div className="bt">{l.title}</div>
            {l.description && <div className="bdesc">{l.description}</div>}
            <div className="bv num">{money(s?s.high:l.starting_price)}</div>
            <div className="bl">{s?<>{firstName(s.name)} · {s.count} bid{s.count===1?"":"s"}</>:"Starting price"}</div>
          </div>
        );})}
      </div>
      {lots.length===0 && <div className="empty" style={{color:"#8ea0aa"}}>No lots yet.</div>}
    </div>
  );
}

/* ---------------- ADMIN ---------------- */
function AdminView({data}){
  const {lots,bids,cfg}=data;
  const [ok,setOk]=useState(false);
  const [pw,setPw]=useState("");
  const [tab,setTab]=useState("lots");

  if(!ok){
    return (
      <div className="wrap"><div className="hero"><div className="eyebrow">Organiser</div><h1>Sign in</h1></div>
        <div className="card" style={{padding:20}}>
          <div className="field"><label>Passcode</label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&setOk(pw===ORGANISER_PASSCODE)} autoFocus/>
          </div>
          <button className="btn btn-slate btn-block" onClick={()=>setOk(pw===ORGANISER_PASSCODE)}>Enter</button>
          {pw&&pw!==ORGANISER_PASSCODE&&<div className="err">Wrong passcode.</div>}
        </div>
      </div>
    );
  }
  return (
    <div className="wrap">
      <div className="hero"><div className="eyebrow">Organiser</div><h1>{cfg.event_name}</h1></div>
      <div className="tabs">
        {[["lots","Lots"],["control","Run"],["display","Display"],["bids","Bids"],["settings","Share"]].map(([k,t])=>
          <button key={k} className={tab===k?"on":""} onClick={()=>setTab(k)}>{t}</button>)}
      </div>
      {tab==="lots"&&<LotsTab data={data}/>}
      {tab==="control"&&<ControlTab data={data}/>}
      {tab==="display"&&<DisplayTab data={data}/>}
      {tab==="bids"&&<BidsTab data={data}/>}
      {tab==="settings"&&<ShareTab data={data}/>}
    </div>
  );
}

function LotsTab({data}){
  const {lots}=data;
  const blank={title:"",description:"",starting_price:50,increment:10,image:null};
  const [form,setForm]=useState(blank);
  const [editId,setEditId]=useState(null);
  const [busy,setBusy]=useState(false);

  async function save(){
    if(!form.title.trim())return;
    setBusy(true);
    const payload={title:form.title,description:form.description,starting_price:Number(form.starting_price)||0,increment:Number(form.increment)||5,image:form.image};
    if(editId) await sb.from("lots").update(payload).eq("id",editId);
    else await sb.from("lots").insert({...payload,sort_order:lots.length});
    setBusy(false);setForm(blank);setEditId(null);data.reload();
  }
  async function del(id){if(confirm("Delete this lot and its bids?")){await sb.from("lots").delete().eq("id",id);data.reload();}}
  async function pickImg(e){const f=e.target.files[0];if(!f)return;const d=await compressImage(f);setForm(s=>({...s,image:d}));}

  return (
    <>
      <div className="card" style={{padding:18,marginBottom:16}}>
        <h3 style={{fontSize:17,color:"var(--slate)",marginBottom:14}}>{editId?"Edit lot":"Add a lot"}</h3>
        <div className="field"><label>Title</label><input value={form.title} onChange={e=>setForm(s=>({...s,title:e.target.value}))} placeholder="e.g. Weekend at Jervis Bay"/></div>
        <div className="field"><label>Description</label><textarea rows="2" value={form.description} onChange={e=>setForm(s=>({...s,description:e.target.value}))}/></div>
        <div style={{display:"flex",gap:12}}>
          <div className="field" style={{flex:1}}><label>Starting price ($)</label><input type="number" value={form.starting_price} onChange={e=>setForm(s=>({...s,starting_price:e.target.value}))}/></div>
          <div className="field" style={{flex:1}}><label>Min increment ($)</label><input type="number" value={form.increment} onChange={e=>setForm(s=>({...s,increment:e.target.value}))}/></div>
        </div>
        <div className="field"><label>Photo</label><input type="file" accept="image/*" onChange={pickImg}/></div>
        {form.image&&<img src={form.image} style={{width:"100%",borderRadius:11,marginBottom:12}}/>}
        <div style={{display:"flex",gap:10}}>
          {editId&&<button className="btn btn-outline" onClick={()=>{setForm(blank);setEditId(null);}}>Cancel</button>}
          <button className="btn btn-primary" style={{flex:1}} onClick={save} disabled={busy||!form.title.trim()}>{busy?"Saving…":editId?"Save changes":"Add lot"}</button>
        </div>
      </div>
      <div className="card" style={{padding:"4px 18px"}}>
        {lots.length===0&&<div className="empty">No lots yet.</div>}
        {lots.map(l=>(
          <div className="adminrow" key={l.id}>
            {l.image&&<img src={l.image} style={{width:54,height:40,objectFit:"cover",borderRadius:8}}/>}
            <div className="grow"><b>{l.title}</b><div>Start {money(l.starting_price)} · +{money(l.increment)}</div></div>
            <button className="btn btn-outline btn-sm" onClick={()=>{setForm({title:l.title,description:l.description||"",starting_price:l.starting_price,increment:l.increment,image:l.image});setEditId(l.id);window.scrollTo(0,0);}}>Edit</button>
            <button className="btn btn-danger btn-sm" onClick={()=>del(l.id)}>Delete</button>
          </div>
        ))}
      </div>
    </>
  );
}

function ControlTab({data}){
  const {cfg}=data;
  const now=useNow();
  const closesAt=cfg.closes_at?new Date(cfg.closes_at).getTime():null;
  const timeLeft=closesAt!=null?closesAt-now:null;
  const open=cfg.is_open&&(closesAt==null||timeLeft>0);
  const [evName,setEvName]=useState(cfg.event_name||"");
  useEffect(()=>setEvName(cfg.event_name||""),[cfg.event_name]);

  async function openFor(min){
    const closes=new Date(Date.now()+min*60000).toISOString();
    await sb.from("auction").update({is_open:true,closes_at:closes,updated_at:new Date().toISOString()}).eq("id",1);data.reload();
  }
  async function extend(min){
    const base=closesAt&&closesAt>Date.now()?closesAt:Date.now();
    await sb.from("auction").update({closes_at:new Date(base+min*60000).toISOString(),is_open:true}).eq("id",1);data.reload();
  }
  async function closeNow(){await sb.from("auction").update({is_open:false}).eq("id",1);data.reload();}
  async function saveName(){await sb.from("auction").update({event_name:evName}).eq("id",1);data.reload();}

  return (
    <>
      <div className="card" style={{padding:20,marginBottom:16,textAlign:"center"}}>
        <div className="eyebrow" style={{color:open?"var(--green-deep)":"var(--red)"}}>{open?"Bidding is open":"Bidding is closed"}</div>
        <div className="num" style={{fontFamily:"'Bricolage Grotesque'",fontWeight:800,fontSize:46,color:"var(--slate)",margin:"6px 0"}}>{open?fmtLeft(timeLeft):"—"}</div>
        {open
          ? <button className="btn btn-danger btn-block" onClick={closeNow}>Close bidding now</button>
          : <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[1,5,15,30,60,90].map(m=><button key={m} className="btn btn-primary btn-sm" style={{flex:"1 1 30%"}} onClick={()=>openFor(m)}>Open {m} min</button>)}
            </div>}
        {open&&<div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
          {[5,10].map(m=><button key={m} className="btn btn-outline btn-sm" style={{flex:1}} onClick={()=>extend(m)}>+{m} min</button>)}
        </div>}
      </div>
      <div className="card" style={{padding:18}}>
        <div className="field"><label>Event name (shows on phones & big screen)</label><input value={evName} onChange={e=>setEvName(e.target.value)}/></div>
        <button className="btn btn-slate btn-block" onClick={saveName}>Save name</button>
      </div>
    </>
  );
}

function DisplayTab({data}){
  const {cfg}=data;
  const [banner,setBanner]=useState(cfg.banner_image||null);
  const [boardMsg,setBoardMsg]=useState(cfg.board_message||"");
  const [bidMsg,setBidMsg]=useState(cfg.bid_message||"");
  const [busy,setBusy]=useState(false);
  const [saved,setSaved]=useState(false);
  useEffect(()=>{setBanner(cfg.banner_image||null);setBoardMsg(cfg.board_message||"");setBidMsg(cfg.bid_message||"");},
    [cfg.banner_image,cfg.board_message,cfg.bid_message]);

  async function pick(e){const f=e.target.files[0];if(!f)return;const d=await compressImage(f,"image/png",1000);setBanner(d);}
  async function save(){
    setBusy(true);
    const {error}=await sb.from("auction").update({banner_image:banner,board_message:boardMsg,bid_message:bidMsg}).eq("id",1);
    setBusy(false);
    if(error){alert("Couldn't save: "+error.message+"\n\nIf it mentions a missing column, run the 3 ALTER TABLE lines in Supabase first.");return;}
    setSaved(true);setTimeout(()=>setSaved(false),2500);data.reload();
  }
  return (
    <>
      <div className="card" style={{padding:18,marginBottom:16}}>
        <h3 style={{fontSize:17,color:"var(--slate)",marginBottom:4}}>Graphic</h3>
        <p style={{fontSize:13,color:"var(--muted)",margin:"0 0 12px"}}>Appears in the header on the big screen and on every bidding page. A transparent PNG logo looks cleanest on the dark screen.</p>
        <div className="field"><input type="file" accept="image/*" onChange={pick}/></div>
        {banner && <>
          <img src={banner} style={{maxWidth:"100%",maxHeight:160,objectFit:"contain",display:"block",margin:"4px 0 12px"}}/>
          <button className="btn btn-danger btn-sm" onClick={()=>setBanner(null)}>Remove graphic</button>
        </>}
      </div>
      <div className="card" style={{padding:18,marginBottom:16}}>
        <div className="field"><label>Big-screen message</label>
          <textarea rows="2" value={boardMsg} onChange={e=>setBoardMsg(e.target.value)} placeholder="e.g. Bid big — every dollar sends a kid to camp!"/></div>
        <div className="field" style={{marginBottom:0}}><label>Bidding-page message (shown on all bidding pages)</label>
          <textarea rows="2" value={bidMsg} onChange={e=>setBidMsg(e.target.value)} placeholder="e.g. Thanks for backing Young Life. Happy bidding!"/></div>
      </div>
      <button className="btn btn-primary btn-block" onClick={save} disabled={busy}>{busy?"Saving…":saved?"Saved ✓":"Save display"}</button>
    </>
  );
}

function BidsTab({data}){
  const {bids,lots}=data;
  const title=(id)=>{const l=lots.find(x=>x.id===id);return l?l.title:"#"+id;};
  function csv(){
    const rows=[["Lot","Bidder","Amount","Time"]];
    bids.slice().reverse().forEach(b=>rows.push([title(b.lot_id),b.bidder_name,b.amount,new Date(b.created_at).toLocaleString("en-AU")]));
    const out=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([out],{type:"text/csv"}));a.download="auction-bids.csv";a.click();
  }
  const sum=summarize(bids);
  return (
    <>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:700,color:"var(--slate)"}}>{bids.length} bids · winners below</div>
        <button className="btn btn-outline btn-sm" onClick={csv} disabled={!bids.length}>Export CSV</button>
      </div>
      <div className="card" style={{padding:"4px 18px",marginBottom:16}}>
        {lots.map(l=>{const s=sum[l.id];return (
          <div className="adminrow" key={l.id}>
            <div className="grow"><b>{l.title}</b><div>{s?`Winner: ${s.name}`:"No bids"}</div></div>
            <div style={{fontWeight:800,color:"var(--green-deep)",fontFamily:"'Bricolage Grotesque'"}}>{money(s?s.high:l.starting_price)}</div>
          </div>
        );})}
      </div>
    </>
  );
}

function ShareTab(){
  const base=location.origin+location.pathname;
  const links=[["Bidding link (give to guests)",base],["Big-screen board",base+"#board"],["This organiser page",base+"#admin"]];
  const qref=useRef(null);
  useEffect(()=>{if(qref.current&&window.QRCode){qref.current.innerHTML="";new window.QRCode(qref.current,{text:base,width:150,height:150,colorDark:"#1b262d",colorLight:"#fff"});}},[base]);
  return (
    <>
      {links.map(([t,u])=>(
        <div key={u}>
          <div style={{fontSize:12,fontWeight:600,color:"var(--muted)",margin:"4px 0 5px"}}>{t}</div>
          <div className="linkbox">
            <a href={u} target="_blank" rel="noopener" style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--green-deep)",fontWeight:600,textDecoration:"underline"}}>{u}</a>
            <button className="btn btn-outline btn-sm" onClick={()=>{navigator.clipboard.writeText(u);}}>Copy</button>
          </div>
        </div>
      ))}
      <div className="card" style={{padding:20,textAlign:"center",marginTop:8}}>
        <div style={{fontWeight:700,color:"var(--slate)",marginBottom:12}}>Guests scan this to bid</div>
        <div ref={qref} style={{display:"inline-block"}}/>
      </div>
    </>
  );
}

/* ---------------- SETUP (shown until keys are filled in) ---------------- */
function Setup(){
  return (
    <div className="setup">
      <div className="card">
        <div className="eyebrow" style={{color:"var(--green-deep)"}}>One-time setup</div>
        <h1 style={{color:"var(--slate)",margin:"6px 0 14px"}}>Connect your Supabase project</h1>
        <ol>
          <li>Create a free project at <code>supabase.com</code>.</li>
          <li>Open <b>SQL Editor</b>, paste in <code>schema.sql</code>, and run it.</li>
          <li>Go to <b>Project Settings → API</b> and copy your <b>Project URL</b> and <b>anon public</b> key.</li>
          <li>Paste both into the <code>CONFIG</code> block near the top of <code>index.html</code>, set a passcode, then commit & push.</li>
        </ol>
        <p style={{color:"var(--muted)",fontSize:14}}>Once the keys are in, this screen is replaced by the auction automatically.</p>
      </div>
    </div>
  );
}

/* ---------------- ROUTER ---------------- */
function App(){
  const [route,setRoute]=useState(location.hash.replace("#","")||"bid");
  useEffect(()=>{const f=()=>setRoute(location.hash.replace("#","")||"bid");window.addEventListener("hashchange",f);return ()=>window.removeEventListener("hashchange",f);},[]);
  const data=useAuction();

  if(!configured) return <Setup/>;

  if(route==="board") return <BoardView data={data}/>;

  return (
    <>
      <div className="topbar"><div className="inner">
        <a href="#bid" className="brand"><span className="yl">YL</span> Young Life Australia</a>
        <span className="spacer"></span>
        <a className="ghost" href="#board" target="_blank">Big screen ↗</a>
        <a className="ghost" href="#admin">Organiser</a>
      </div></div>
      {!data.ready
        ? <div className="empty">Loading…</div>
        : data.err
          ? <div className="wrap"><div className="err" style={{marginTop:30}}>Couldn't reach Supabase: {data.err}</div></div>
          : route==="admin" ? <AdminView data={data}/> : <GuestView data={data}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
