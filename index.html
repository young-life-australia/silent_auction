<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Young Life Australia — Silent Auction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#90C038; --green-d:#74961f; --green-deep:#5f7d17;
    --slate:#385060; --slate-d:#2a3d49; --slate-dd:#1b262d;
    --paper:#FBFBF6; --card:#ffffff; --line:#e7e6dd;
    --ink:#28323a; --muted:#6c7a82;
    --amber:#E8B23A; --red:#d2493f;
    --shadow:0 1px 2px rgba(40,50,58,.06), 0 8px 24px rgba(40,50,58,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;margin:0;line-height:1.05;letter-spacing:-.01em}
  .num{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,textarea,select{font-family:inherit;font-size:16px}
  a{color:inherit}

  /* layout */
  .wrap{max-width:760px;margin:0 auto;padding:0 18px 90px}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(251,251,246,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topbar .inner{max-width:760px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Bricolage Grotesque';font-weight:800;color:var(--slate);font-size:18px}
  .brand .yl{width:30px;height:30px;border-radius:8px;background:var(--green);display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px}
  .spacer{flex:1}
  .ghost{font-size:12px;color:var(--muted);text-decoration:none;padding:6px 10px;border-radius:8px}
  .ghost:hover{background:#fff}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;border-radius:12px;padding:13px 18px;font-size:15px;transition:transform .05s ease, background .15s ease}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--green);color:#fff}
  .btn-primary:hover{background:var(--green-d)}
  .btn-slate{background:var(--slate);color:#fff}
  .btn-slate:hover{background:var(--slate-d)}
  .btn-outline{background:#fff;border:1.5px solid var(--line);color:var(--slate)}
  .btn-outline:hover{border-color:var(--slate-l,#9aa)}
  .btn-danger{background:#fff;border:1.5px solid #eccfcc;color:var(--red)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-sm{padding:9px 12px;font-size:13px;border-radius:10px}
  .btn-block{width:100%}

  .field{display:block;margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .field input,.field textarea,.field select{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;background:#fff;color:var(--ink)}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--green)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}

  /* guest hero */
  .hero{padding:26px 0 8px}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green-deep)}
  .hero h1{font-size:clamp(26px,7vw,38px);color:var(--slate);margin-top:8px}
  .hero .sub{color:var(--muted);margin-top:8px;font-size:15px}
  .statusbar{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:7px 12px;border-radius:999px;background:#fff;border:1px solid var(--line)}
  .pill .dot{width:8px;height:8px;border-radius:999px;background:var(--muted)}
  .pill.open .dot{background:var(--green);box-shadow:0 0 0 4px rgba(144,192,56,.18)}
  .pill.closed .dot{background:var(--red)}
  .pill .clk{font-variant-numeric:tabular-nums;font-weight:700;color:var(--slate)}

  /* lot card */
  .lot{overflow:hidden;margin-top:16px}
  .lot .photo{aspect-ratio:16/9;background:#eef0ea;display:block;width:100%;object-fit:cover}
  .lot .photo.empty{display:grid;place-items:center;color:#aeb6ad;font-size:13px}
  .lot .body{padding:16px 16px 18px}
  .lot h3{font-size:19px;color:var(--slate)}
  .lot .desc{color:var(--muted);font-size:14px;margin-top:6px}
  .lot .bidrow{display:flex;align-items:flex-end;justify-content:space-between;margin-top:14px;gap:12px}
  .lot .amt{font-family:'Bricolage Grotesque';font-weight:800;font-size:26px;color:var(--green-deep)}
  .lot .amt small{display:block;font-family:'Plus Jakarta Sans';font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
  .lot .leader{font-size:12.5px;color:var(--muted);text-align:right}
  .lot .leader b{color:var(--slate)}
  .quick{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .quick .btn-sm{flex:1;min-width:90px}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(27,38,45,.5);backdrop-filter:blur(2px);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}
  .sheet{background:#fff;width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:22px 20px 28px;animation:rise .22s ease}
  @media(min-width:560px){.scrim{align-items:center}.sheet{border-radius:20px}}
  @keyframes rise{from{transform:translateY(24px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sheet h3{font-size:22px;color:var(--slate)}
  .sheet .meta{color:var(--muted);font-size:13px;margin-top:4px}

  /* toast */
  .toasts{position:fixed;left:0;right:0;bottom:18px;z-index:80;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
  .toast{background:var(--slate-d);color:#fff;padding:11px 16px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:rise .2s ease}
  .toast.win{background:var(--green-d)}

  /* ===== BOARD (projector) ===== */
  .board{min-height:100vh;background:var(--slate-dd);color:#fff;padding:28px 34px 40px}
  .board .bhead{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .board .bbrand{display:flex;align-items:center;gap:14px}
  .board .bbrand .yl{width:54px;height:54px;border-radius:13px;background:var(--green);display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:22px}
  .board .bbrand .t{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(22px,2.4vw,34px);line-height:1}
  .board .bbrand .t small{display:block;font-family:'Plus Jakarta Sans';font-weight:600;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--green);margin-top:6px}
  .countbox{margin-left:auto;text-align:right}
  .countbox .lbl{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#8ea0aa;font-weight:700}
  .countbox .clock{font-family:'Bricolage Grotesque';font-weight:800;font-variant-numeric:tabular-nums;font-size:clamp(48px,7vw,96px);line-height:.95;color:var(--amber);letter-spacing:.01em}
  .countbox .clock.urgent{color:var(--red);animation:pulse 1s ease-in-out infinite}
  .countbox .clock.done{color:#8ea0aa;font-size:clamp(34px,4vw,56px)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

  .totalbar{display:flex;align-items:center;justify-content:space-between;gap:24px;margin:26px 0 8px;padding:20px 26px;background:linear-gradient(100deg,var(--slate-d),var(--slate));border-radius:18px;flex-wrap:wrap}
  .totalbar .tt{font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#aebfc8;font-weight:700}
  .totalbar .tv{font-family:'Bricolage Grotesque';font-weight:800;font-variant-numeric:tabular-nums;font-size:clamp(40px,6vw,76px);color:var(--green);line-height:1}
  .totalbar .qr{background:#fff;padding:10px;border-radius:12px;text-align:center}
  .totalbar .qr canvas,.totalbar .qr img{display:block}
  .totalbar .qr span{display:block;font-size:11px;color:var(--slate);font-weight:700;margin-top:6px;letter-spacing:.04em}

  .bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:18px}
  .bcard{background:#22323b;border:1px solid #2f4450;border-radius:15px;padding:16px 18px;display:flex;flex-direction:column;gap:6px;min-height:120px}
  .bcard .bt{font-family:'Bricolage Grotesque';font-weight:700;font-size:19px}
  .bcard .bv{font-family:'Bricolage Grotesque';font-weight:800;font-variant-numeric:tabular-nums;font-size:34px;color:var(--green);margin-top:auto}
  .bcard .bl{font-size:13px;color:#9fb1bb}
  .bcard .bl b{color:#dfe9ee}

  /* ===== ADMIN ===== */
  .tabs{display:flex;gap:6px;margin:16px 0;background:#fff;border:1px solid var(--line);border-radius:13px;padding:5px}
  .tabs button{flex:1;padding:10px;border-radius:9px;font-weight:700;font-size:13px;color:var(--muted)}
  .tabs button.on{background:var(--slate);color:#fff}
  .adminrow{display:flex;gap:10px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
  .adminrow:last-child{border-bottom:none}
  .adminrow .grow{flex:1;min-width:0}
  .adminrow .grow b{color:var(--slate)}
  .adminrow .grow div{font-size:13px;color:var(--muted)}
  .linkbox{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:10px;font-size:13px}
  .linkbox code{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--slate)}

  .setup{max-width:640px;margin:40px auto;padding:0 20px}
  .setup .card{padding:26px}
  .setup code{background:#f1f2ec;padding:2px 6px;border-radius:6px;font-size:13px}
  .setup ol{padding-left:18px;line-height:1.9}
  .empty{text-align:center;color:var(--muted);padding:50px 20px}
  .err{background:#fbeceb;border:1px solid #f1cfcc;color:#b23b32;padding:11px 14px;border-radius:11px;font-size:14px;margin-top:10px}

  /* organiser-supplied graphic + messages */
  .ghead{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .glogo{background:#fff;border:1px solid var(--line);border-radius:13px;padding:7px 10px;display:grid;place-items:center;flex:none}
  .glogo img{max-height:58px;max-width:160px;display:block;object-fit:contain}
  .gtitle{min-width:0}
  .board .blogo{background:#fff;border-radius:16px;padding:12px 18px;display:grid;place-items:center}
  .board .blogo img{max-height:96px;max-width:380px;display:block;object-fit:contain}
  .board .bmsg{margin-top:18px;font-size:clamp(17px,2vw,26px);font-weight:600;color:#e7eef2;line-height:1.35;max-width:1100px;white-space:pre-wrap}
  .bcard .bphoto{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:10px;margin-bottom:10px;background:#2b3d47}
  .bcard .bdesc{font-size:13.5px;color:#9fb1bb;line-height:1.4}

  /* final-minutes excitement + finished states */
  @keyframes ribbon{0%,100%{transform:scale(1)}50%{transform:scale(1.012)}}
  @keyframes glowpulse{0%,100%{box-shadow:inset 0 0 0 0 rgba(210,73,63,0)}50%{box-shadow:inset 0 0 140px 0 rgba(210,73,63,.30)}}
  .board.final{animation:glowpulse 1.4s ease-in-out infinite}
  .finalribbon{margin-top:18px;padding:15px 20px;border-radius:14px;text-align:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(20px,2.6vw,34px);letter-spacing:.02em;color:#fff;background:linear-gradient(100deg,#d2493f,#e8b23a);animation:ribbon 1s ease-in-out infinite}
  .bfinish{margin-top:20px;padding:26px 30px;border-radius:18px;background:linear-gradient(120deg,#2f6d2f,#5f7d17);text-align:center}
  .bfinish .bftag{font-size:13px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:#cfe6a8}
  .bfinish .bftitle{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(26px,4vw,52px);color:#fff;margin-top:8px;line-height:1.12;white-space:pre-wrap}

  /* guest winner panel */
  .wonpanel{padding:20px;margin-top:8px;border:1.5px solid var(--green);background:linear-gradient(180deg,#f3f9e8,#fff)}
  .wonpanel .wontag{font-family:'Bricolage Grotesque';font-weight:800;font-size:21px;color:var(--green-deep);margin-bottom:12px}
  .wonrow{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line)}
  .wonrow b{color:var(--slate);font-family:'Bricolage Grotesque'}
  .wonrow.wontotal{border-bottom:none;border-top:2px solid var(--slate);margin-top:4px;font-size:17px}
  .wonrow.wontotal b{color:var(--green-deep)}
  .payinstr{margin-top:14px;padding:14px 16px;background:#fff;border:1px solid var(--line);border-radius:12px;font-size:14px;line-height:1.5;white-space:pre-wrap;color:var(--ink)}
  .gfoot{text-align:center;padding:34px 0 8px}
  .gfoot a{font-size:12px;color:var(--muted);text-decoration:none;opacity:.55}
  .gfoot a:hover{opacity:1;text-decoration:underline}
  .linklike{background:none;border:none;color:var(--green-deep);font:inherit;font-weight:600;text-decoration:underline;cursor:pointer;padding:0 0 0 2px}
</style>
</head>

<div id="root"><div style="padding:40px;text-align:center;color:#6c7a82;font-family:sans-serif">Loading the auction…</div></div>
